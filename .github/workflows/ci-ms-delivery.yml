name: ms-delivery-prd

on:
  push:
    branches:
      - main
    paths:
      - "ms-delivery/**"

env:
  SHARED_NETWORK: garage-shared-net
  RABBITMQ_CONTAINER_NAME: rabbitmq
  RABBITMQ_HOST: rabbitmq

jobs:
  # JOB 1: Build do Maven
  maven-build:
    runs-on: k8s-srv
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean package -DskipTests -f ms-delivery/pom.xml

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msdelivery-jar
          path: ms-delivery/target/msdelivery-0.0.1-SNAPSHOT.jar

  # JOB 2: Build da Imagem Docker
  docker-build:
    needs: maven-build
    runs-on: k8s-srv
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: msdelivery-jar
          path: ms-delivery/target/

      - name: Build Local Image
        run: |
          cd ms-delivery
          docker build -t msdelivery:latest .

  # JOB 3: Push para o Docker Hub
  docker-push:
    needs: docker-build
    runs-on: k8s-srv
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Private ECR
        id: login-ecr-private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push to Private ECR
        run: |
          IMAGE_TAG="260761541415.dkr.ecr.us-east-1.amazonaws.com/msdelivery:latest"

          docker tag msdelivery:latest $IMAGE_TAG
          docker push $IMAGE_TAG

  # JOB 4: Deploy and Restart
  deploy:
    needs: docker-push
    runs-on: k8s-srv
    concurrency:
      group: ms-delivery-deploy
      cancel-in-progress: false
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Private ECR
        id: login-ecr-private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Restart Container
        run: |
          set -euo pipefail

          IMAGE_TAG="260761541415.dkr.ecr.us-east-1.amazonaws.com/msdelivery:latest"
          CONTAINER_NAME="ms-delivery-container"

          docker network inspect "$SHARED_NETWORK" >/dev/null 2>&1 || docker network create "$SHARED_NETWORK"

          if ! docker inspect "$RABBITMQ_CONTAINER_NAME" >/dev/null 2>&1; then
            echo "RabbitMQ container '$RABBITMQ_CONTAINER_NAME' is not running on this runner."
            echo "Run workflow ci-infra-rabbitmq.yml first."
            exit 1
          fi

          docker network connect "$SHARED_NETWORK" "$RABBITMQ_CONTAINER_NAME" 2>/dev/null || true

          RABBIT_STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$RABBITMQ_CONTAINER_NAME" 2>/dev/null || echo "unknown")
          if [ "$RABBIT_STATUS" = "unhealthy" ]; then
            echo "RabbitMQ is unhealthy."
            docker logs "$RABBITMQ_CONTAINER_NAME" || true
            exit 1
          fi

          docker rmi $IMAGE_TAG 2>/dev/null || true
          docker pull $IMAGE_TAG

          if docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
            docker stop "$CONTAINER_NAME"
            docker rm "$CONTAINER_NAME"

            for i in $(seq 1 15); do
              if ! docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
          fi

          if docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
            echo "Container '$CONTAINER_NAME' still exists after waiting for removal."
            docker ps -a --filter "name=^/${CONTAINER_NAME}$"
            exit 1
          fi

          docker run -d \
            --pull always \
            --name "$CONTAINER_NAME" \
            --network "$SHARED_NETWORK" \
            --restart unless-stopped \
            -e DB_HOST=192.168.122.79 \
            -e DB_PORT=5432 \
            -e DB_NAME=msdelivery_db \
            -e DB_USER=postgres \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e RABBITMQ_HOST=${{ env.RABBITMQ_HOST }} \
            -e RABBITMQ_PORT=5672 \
            -e RABBITMQ_USERNAME=garage_user \
            -e RABBITMQ_PASSWORD=garage_password \
            -e RABBITMQ_VHOST=/ \
            $IMAGE_TAG
