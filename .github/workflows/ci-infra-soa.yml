name: Build and Push WildFly SOA Image to ECR
on:
  push:
    paths:
      - "infraestructure/images/wildfly-soa/**"

jobs:
  build-image:
    runs-on: k8s-dsv
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Wildfly Image
        run: |
          cd infraestructure/images/wildfly-soa
          docker build -t wildfly-soa:latest .

  # JOB 3: Push para o ECR
  docker-push:
    needs: build-image
    runs-on: k8s-dsv
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Private ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push to Private ECR
        run: |
          IMAGE_TAG="260761541415.dkr.ecr.us-east-1.amazonaws.com/wildfly-soa:latest"

          docker tag wildfly-soa:latest $IMAGE_TAG
          docker push $IMAGE_TAG
