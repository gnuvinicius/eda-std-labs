name: Build and run RabbitMQ in DSV Environment

on:
  push:
    paths:
      - "infraestructure/images/rabbitmq/**"
jobs:
  build-and-run:
    runs-on: k8s-dsv
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build RabbitMQ Image
        run: |
          cd infraestructure/images/rabbitmq
          docker build -t rabbitmq:latest .

      - name: Run RabbitMQ Container
        run: |
          IMAGE_TAG="rabbitmq:latest"
          docker rmi $IMAGE_TAG 2>/dev/null || true
          docker pull $IMAGE_TAG
          docker stop rabbitmq 2>/dev/null || true
          docker rm rabbitmq 2>/dev/null || true
          docker run -d \
            --name rabbitmq \
            -p 5672:5672 \
            -p 15672:15672 \
            --restart unless-stopped \
            $IMAGE_TAG
