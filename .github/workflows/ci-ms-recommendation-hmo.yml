name: ms-recommendation-hmo

on:
    push:
        branches:
            - develop
        paths:
            - "ms-recommendation/**"

env:
    SHARED_NETWORK: garage-shared-net
    RABBITMQ_HOST: rabbitmq
    API_GATEWAY_CONTAINER_NAME: api-gateway

jobs:
    # JOB 1: Build da Imagem Docker
    docker-build:
        runs-on: k8s-srv
        steps:
            - uses: actions/checkout@v4

            - name: Build Local Image
              run: |
                  set -euo pipefail

                  cd ms-recommendation
                  docker build -t msrecommendation:latest .

    # JOB 2: Deploy and Restart
    deploy:
        needs: docker-build
        runs-on: k8s-srv
        concurrency:
            group: ms-recommendation-hmo-deploy
            cancel-in-progress: false
        steps:
            - name: Restart Container
              run: |
                  set -euo pipefail

                  IMAGE_TAG="msrecommendation:latest"
                  CONTAINER_NAME="ms-recommendation-container"

                  docker network inspect "$SHARED_NETWORK" >/dev/null 2>&1 || docker network create "$SHARED_NETWORK"

                  if docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
                    docker stop "$CONTAINER_NAME"
                    docker rm "$CONTAINER_NAME"

                    for i in $(seq 1 15); do
                      if ! docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
                        break
                      fi
                      sleep 2
                    done
                  fi

                  if docker container inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
                    echo "Container '$CONTAINER_NAME' still exists after waiting for removal."
                    docker ps -a --filter "name=^/${CONTAINER_NAME}$"
                    exit 1
                  fi

                  docker run -d \
                    --name "$CONTAINER_NAME" \
                    --network "$SHARED_NETWORK" \
                    --network-alias "$CONTAINER_NAME" \
                    --restart unless-stopped \
                    -e DB_HOST=postgres \
                    -e DB_PORT=5432 \
                    -e DB_NAME=msrecommendation_db \
                    -e DB_USER=postgres \
                    -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                    -e RABBITMQ_HOST=rabbitmq \
                    -e RABBITMQ_PORT=5672 \
                    -e RABBITMQ_USERNAME=garage_user \
                    -e RABBITMQ_PASSWORD=garage_password \
                    -e RABBITMQ_VHOST=/ \
                    "$IMAGE_TAG"

                  # Reconnect gateway to the shared network if it exists on this runner.
                  if docker container inspect "$API_GATEWAY_CONTAINER_NAME" >/dev/null 2>&1; then
                    docker network connect "$SHARED_NETWORK" "$API_GATEWAY_CONTAINER_NAME" 2>/dev/null || true
                  fi

                  # Ensure recommendation container is reachable inside the Docker network.
                  for i in $(seq 1 20); do
                    if docker run --rm --network "$SHARED_NETWORK" busybox:1.36 sh -c "nc -z -w 2 ms-recommendation-container 8000" >/dev/null 2>&1; then
                      echo "ms-recommendation is reachable on network '$SHARED_NETWORK'"
                      exit 0
                    fi
                    sleep 2
                  done

                  echo "ms-recommendation container is not reachable on '$SHARED_NETWORK'"
                  docker ps -a --filter "name=^/${CONTAINER_NAME}$"
                  docker logs "$CONTAINER_NAME" || true
                  exit 1
