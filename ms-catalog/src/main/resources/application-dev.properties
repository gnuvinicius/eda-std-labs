spring.application.name=mscatalog

# PostgreSQL (container) datasource settings
spring.datasource.url=jdbc:postgresql://192.168.122.79:5432/mscatalog_db
spring.datasource.username=postgres
spring.datasource.password=2AkByM4NfHFkeJz
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.out-of-order=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# configuracao do rabbitMQ
