services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: obs-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - garage-shared-net

  tempo:
    image: grafana/tempo:2.7.2
    container_name: obs-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"    # Tempo query frontend
      - "4317:4317"    # OTLP gRPC ingest
      - "4318:4318"    # OTLP HTTP ingest
    networks:
      - garage-shared-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: obs-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
      - "8889:8889"  # Prometheus exporter (collector metrics pipeline)
    networks:
      - garage-shared-net

  loki:
    image: grafana/loki:3.4.2
    container_name: obs-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - garage-shared-net

  grafana:
    image: grafana/grafana:11.6.0
    container_name: obs-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - garage-shared-net

networks:
  garage-shared-net:
    name: garage-shared-net
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data: