global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se auto-coleta
  - job_name: prometheus
    static_configs:
      - targets: ["obs-prometheus:9090"]

  # Métricas do OTel Collector (exportadas em 8889)
  - job_name: otel-collector
    static_configs:
      - targets: ["obs-otel-collector:8889"]

  # Spring Boot (containers definidos nos workflows)
  - job_name: ms-catalog-container
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ms-catalog-container:8080"]

  - job_name: ms-delivery-container
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ms-delivery-container:8080"]

  # Django service
  - job_name: ms-recommendation-container
    metrics_path: /metrics
    static_configs:
      - targets: ["ms-recommendation-container:8000"]

  # RabbitMQ exposto nos workflows em 15672 (management).
  # Se /metrics nao estiver habilitado nessa imagem, habilite o plugin rabbitmq_prometheus.
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15672"]

  # PostgreSQL nao expõe metrics Prometheus nativamente na porta 5432.
  # Configure um exporter (ex.: postgres-exporter) e mantenha o alvo abaixo.
  - job_name: postgres
    static_configs:
      - targets: ["postgres:9187"]