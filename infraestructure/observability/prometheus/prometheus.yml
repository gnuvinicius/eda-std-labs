global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se auto-coleta
  - job_name: prometheus
    static_configs:
      - targets: ["obs-prometheus:9090"]

  # Container metrics via cAdvisor.
  - job_name: cadvisor
    static_configs:
      - targets: ["obs-cadvisor:8080"]

  # Métricas do OTel Collector (exportadas em 8889)
  - job_name: otel-collector
    static_configs:
      - targets: ["obs-otel-collector:8889"]

  # RabbitMQ broker metrics via rabbitmq_prometheus plugin.
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]

  # PostgreSQL metrics via postgres-exporter.
  - job_name: postgres
    static_configs:
      - targets: ["obs-postgres-exporter:9187"]

  # Optional application metrics.
  # These services are not instrumented in the current repository, so container-level
  # monitoring is provided by cAdvisor above. Re-enable these jobs after adding:
  # - Spring Boot Actuator + Micrometer Prometheus to ms-catalog and ms-delivery.
  # - django-prometheus or OTEL metrics export to ms-recommendation.