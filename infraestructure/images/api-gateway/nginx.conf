server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $catalog_upstream ms-catalog-container:8080;
    set $delivery_upstream ms-delivery-container:8080;
    set $recommendation_upstream ms-recommendation-container:8000;

    # Basic liveness endpoint for CI checks and container health probes.
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location ~ ^/api/catalog/?(.*)$ {
        proxy_pass http://$catalog_upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/catalog;
    }

    location ~ ^/api/delivery/?(.*)$ {
        proxy_pass http://$delivery_upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/delivery;
    }

    location ~ ^/api/recommendation/?(.*)$ {
        proxy_pass http://$recommendation_upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/recommendation;
    }

    location / {
        add_header Content-Type text/plain;
        return 404 'Route not found on API Gateway';
    }
}
