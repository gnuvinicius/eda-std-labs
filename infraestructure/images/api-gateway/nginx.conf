server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Basic liveness endpoint for CI checks and container health probes.
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /catalog/ {
        # Strip /api/catalog prefix and forward only /api/v1/... to catalog service.
        proxy_pass http://ms-catalog-container:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /delivery/ {
        set $delivery_upstream http://ms-delivery-container:8080;
        proxy_pass $delivery_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /recommendation/ {
        set $recommendation_upstream http://ms-recommendation-container:8000;
        proxy_pass $recommendation_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Content-Type text/plain;
        return 404 'Route not found on API Gateway';
    }
}
