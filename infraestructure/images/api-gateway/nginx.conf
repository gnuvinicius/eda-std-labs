server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Basic liveness endpoint for CI checks and container health probes.
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /catalog/ {
        proxy_pass http://ms-catalog-container:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /delivery/ {
        proxy_pass http://ms-delivery-container:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # location /recommendation/ {
    #     proxy_pass http://ms-recommendation-container:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Port $server_port;
    # }

    location / {
        add_header Content-Type text/plain;
        return 404 'Route not found on API Gateway';
    }
}
