spring.application.name=msdelivery
server.servlet.context-path=/delivery
server.forward-headers-strategy=framework

spring.profiles.active=dev

# PostgreSQL (container) datasource settings
spring.datasource.url=jdbc:postgresql://192.168.56.101:5432/msdelivery_db
spring.datasource.username=postgres
spring.datasource.password=2AkByM4NfHFkeJz
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
# Permite que as migracoes sejam executadas fora de ordem
spring.flyway.out-of-order=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# configuracao do rabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:garage_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:garage_password}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

delivery.rabbit.exchange=${ORDER_EVENTS_EXCHANGE:order.events.exchange}
delivery.rabbit.routing-key=${ORDER_CREATED_ROUTING_KEY:order.created.v1}
delivery.rabbit.queue=${ORDER_CREATED_QUEUE:order.created.v1.queue}
delivery.rabbit.dlx=${ORDER_EVENTS_DLX:order.events.dlx}
delivery.rabbit.dlq=${ORDER_CREATED_DLQ:order.created.v1.dlq}
delivery.rabbit.dlq-routing-key=${ORDER_CREATED_DLQ_ROUTING_KEY:order.created.v1.dlq}
delivery.rabbit.publish-enabled=${RABBITMQ_PUBLISH_ENABLED:true}

